<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Doorway</title>
<style>
  /* ---- Reset / base ---- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      "Helvetica Neue", Arial, sans-serif;
    color: #e5dfd2;
    background: transparent;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ---- App shell ---- */
  /* The widget is designed to live pinned in PIP mode (per Day 1 design
     call). That means it needs to look okay at ~320px tall — no internal
     scrollbars, no cramped sprites. Inline mode gets a taller default
     so it's not a postage stamp in the chat transcript. */
  #app {
    width: 100%;
    height: 100%;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    background: #1a1612;
    border-radius: 10px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 220ms ease-out;
  }
  #app.ready { opacity: 1; }
  body:not(.pinned) #app { min-height: 440px; }

  /* ---- World mode ---- */
  #world {
    position: relative;       /* positioning context for absolutely-placed sprites/furniture */
    flex: 1;
    /* Warm interior wood-floor feel via gradient — placeholder, not real art */
    background:
      radial-gradient(ellipse at 50% 30%, #2d231c 0%, #1a1310 60%, #120c08 100%),
      #1a1310;
    cursor: pointer;
    user-select: none;
    overflow: hidden;
  }

  /* The room is laid out in abstract 0–100 percentage coords from the
     server. Everything inside #world uses % positioning so the layout
     scales to whatever iframe size ChatGPT gives us. */
  .obj {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* Furniture */
  .furn {
    transform: translate(0, 0); /* corner-anchored */
    border-radius: 3px;
  }
  .furn.window {
    background: linear-gradient(160deg, #5a7a8a 0%, #3a5666 100%);
    box-shadow:
      inset 0 0 0 2px #1a1310,
      0 0 24px rgba(120, 160, 180, 0.18);
    border: 1px solid #1a1310;
  }
  .furn.window::before, .furn.window::after {
    content: ""; position: absolute; background: #1a1310;
  }
  .furn.window::before { left: 50%; top: 0; bottom: 0; width: 2px; transform: translateX(-50%); }
  .furn.window::after  { top: 50%; left: 0; right: 0; height: 2px; transform: translateY(-50%); }

  .furn.counter {
    background: linear-gradient(180deg, #6b4a2e 0%, #4a3220 100%);
    box-shadow: 0 2px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    border-radius: 2px;
  }
  .furn.table {
    background: linear-gradient(180deg, #5a3d24 0%, #3d2818 100%);
    box-shadow: 0 4px 8px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
    border-radius: 4px;
  }
  .furn.door {
    background: linear-gradient(90deg, #2a1c12 0%, #3a2818 50%, #2a1c12 100%);
    border: 1px solid #1a1310;
    border-radius: 1px;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.6);
  }

  /* Characters */
  .char {
    width: 26px;
    height: 44px;
    transition: left 480ms cubic-bezier(0.33, 0, 0.4, 1),
                top 480ms cubic-bezier(0.33, 0, 0.4, 1);
    will-change: left, top;
  }
  .char .body {
    position: absolute;
    left: 50%; top: 38%;
    width: 22px; height: 28px;
    transform: translateX(-50%);
    border-radius: 6px 6px 4px 4px;
  }
  .char .head {
    position: absolute;
    left: 50%; top: 0;
    width: 14px; height: 14px;
    transform: translateX(-50%);
    border-radius: 50%;
  }
  .char .shadow {
    position: absolute;
    left: 50%; bottom: -3px;
    width: 22px; height: 5px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 70%);
    border-radius: 50%;
  }

  /* Player — cooler blue tones */
  #player .body { background: linear-gradient(180deg, #4a78a8 0%, #2f5378 100%); }
  #player .head { background: #d8b89a; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15); }

  /* Milli — warmer terracotta + muted sage. She faces the window slightly. */
  #milli .body { background: linear-gradient(180deg, #8a5a4a 0%, #5e3a2c 100%); }
  #milli .head { background: #e8c8a8; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15); }
  #milli { transform: translate(-50%, -50%) rotate(-6deg); }
  #milli.tappable { cursor: pointer; pointer-events: auto; }
  #milli.tappable:hover { filter: brightness(1.15); }

  /* Subtle interaction hint — tiny floating dot above Milli */
  #milli::before {
    content: "·";
    position: absolute;
    left: 50%; top: -18px;
    transform: translateX(-50%);
    font-size: 28px; line-height: 1;
    color: rgba(232, 200, 168, 0.55);
    animation: hintBob 2.4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes hintBob {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.4; }
    50%      { transform: translateX(-50%) translateY(-4px); opacity: 0.85; }
  }

  /* HUD strip — tiny, just enough to know what's going on */
  #hud {
    height: 28px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(229, 223, 210, 0.55);
    background: #120c08;
    border-top: 1px solid rgba(255,255,255,0.04);
    letter-spacing: 0.04em;
  }
  #hud .left { font-weight: 500; }
  #hud .right { font-style: italic; opacity: 0.7; }

  /* ---- Conversation mode (Day 2a) ----
     Structured as a column: portrait at top, her line in the middle, bottom
     row with chat hint + step-away button. The whole panel fades in, and
     each new line fades in inside the panel when milli_line changes. That
     tiny animation is what makes "she just said that" feel like speech
     rather than a DOM update. */
  #conversation {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 22%, rgba(58, 44, 34, 0.98) 0%, rgba(20, 14, 10, 0.99) 70%),
      #140e0a;
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 18px 22px 14px;
    text-align: center;
    animation: fadeIn 320ms ease-out;
  }
  #conversation.show { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.985); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* Portrait placeholder — same vocabulary as Milli's sprite, bigger.
     When we add real art, the silhouette stays; the gradients get replaced. */
  #milli-portrait {
    width: 60px;
    height: 72px;
    position: relative;
    margin: 4px 0 10px;
    flex-shrink: 0;
    animation: breath 4.2s ease-in-out infinite;
  }
  #milli-portrait .p-body {
    position: absolute;
    left: 50%; top: 38%;
    width: 50px; height: 46px;
    transform: translateX(-50%);
    border-radius: 10px 10px 6px 6px;
    background: linear-gradient(180deg, #8a5a4a 0%, #5e3a2c 100%);
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
  }
  #milli-portrait .p-head {
    position: absolute;
    left: 50%; top: 0;
    width: 32px; height: 32px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: #e8c8a8;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.12);
  }
  @keyframes breath {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }

  /* Her name, quietly. Not a title banner. */
  #milli-name {
    font-size: 11px;
    color: rgba(232, 200, 168, 0.55);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* The line she just said. Emotional centerpiece — treat the typography
     as carefully as anything in the game. */
  #milli-line-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 420px;
    min-height: 56px;
    padding: 0 4px;
  }
  #milli-line {
    font-size: 15.5px;
    line-height: 1.55;
    color: #f0e4d0;
    letter-spacing: 0.005em;
    /* Mood-colored short vertical bar to the left — as if her voice has
       a tone. Color shifts with mood via --mood-color CSS variable. */
    border-left: 2px solid var(--mood-color, rgba(232, 200, 168, 0.5));
    padding-left: 14px;
    text-align: left;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 320ms ease-out, transform 320ms ease-out;
  }
  #milli-line.shown {
    opacity: 1;
    transform: translateY(0);
  }
  #milli-line.empty {
    color: rgba(229, 223, 210, 0.32);
    font-style: italic;
    border-left-color: rgba(232, 200, 168, 0.15);
    animation: waiting 1.6s ease-in-out infinite;
  }
  @keyframes waiting {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1.0; }
  }

  /* Bottom row — chat hint on the left, step-away on the right. */
  #conv-footer {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 10px;
  }
  #chat-hint {
    font-size: 10.5px;
    color: rgba(229, 223, 210, 0.38);
    font-style: italic;
    letter-spacing: 0.02em;
    text-align: left;
    flex: 1;
  }

  .leave-btn {
    background: transparent;
    border: 1px solid rgba(232, 200, 168, 0.35);
    color: #e8c8a8;
    padding: 6px 13px;
    font-size: 12px;
    font-family: inherit;
    border-radius: 6px;
    cursor: pointer;
    transition: background 160ms ease, border-color 160ms ease;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .leave-btn:hover {
    background: rgba(232, 200, 168, 0.08);
    border-color: rgba(232, 200, 168, 0.65);
  }
  .leave-btn:disabled {
    opacity: 0.4; cursor: wait;
  }

  /* ---- Inventory badge (small, bottom-left of world) ----
     Day 2b: items animate in when added, animate out when removed. The
     whole point of the inventory on-screen is "I'm holding something / I'm
     not holding it anymore," so the add/remove moment should feel like a
     beat, not a pop. */
  #inventory {
    position: absolute;
    left: 10px;
    bottom: 38px;
    display: flex;
    gap: 6px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 260ms ease-out;
    z-index: 2;
  }
  #inventory.show { opacity: 1; }
  .inv-item {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: rgba(20, 14, 10, 0.72);
    border: 1px solid rgba(232, 200, 168, 0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transform: scale(1);
    opacity: 1;
    transition: transform 260ms ease-out, opacity 260ms ease-out;
  }
  .inv-item.enter {
    transform: scale(0.6);
    opacity: 0;
  }
  .inv-item.enter.shown {
    transform: scale(1);
    opacity: 1;
  }
  .inv-item.exit {
    transform: scale(0.6);
    opacity: 0;
  }

  /* ---- Outcome card (Day 2b) ----
     Shows briefly when end_conversation fires. Not a "level up" screen.
     A held breath: Milli's summary in her own voice, mood-tinted, then
     dissolves back to world. The card is positioned as an overlay above
     the world view, NOT the conversation view (conv has already closed). */
  #outcome {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(32, 24, 18, 0.96) 0%, rgba(18, 12, 8, 0.98) 80%),
      #120c08;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 26px;
    text-align: center;
    z-index: 3;
    opacity: 0;
    transition: opacity 520ms ease-out;
  }
  #outcome.show {
    display: flex;
    opacity: 1;
  }
  #outcome-mood {
    font-size: 10.5px;
    color: rgba(232, 200, 168, 0.6);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--outcome-mood-color, rgba(232, 200, 168, 0.4));
    padding-bottom: 8px;
  }
  #outcome-summary {
    font-size: 15px;
    line-height: 1.6;
    color: #f0e4d0;
    max-width: 440px;
    font-style: italic;
    letter-spacing: 0.005em;
  }
  #outcome-summary::before { content: "“ "; color: rgba(232, 200, 168, 0.5); }
  #outcome-summary::after  { content: " ”"; color: rgba(232, 200, 168, 0.5); }
  #outcome-delta {
    margin-top: 18px;
    font-size: 10.5px;
    color: rgba(229, 223, 210, 0.4);
    letter-spacing: 0.14em;
  }

  /* ---- No-host fallback (when opened in a plain browser) ---- */
  #no-host {
    display: none;
    padding: 24px;
    color: #ddd;
    font-size: 13px;
    line-height: 1.5;
  }
  body.no-host #app { display: none; }
  body.no-host #no-host { display: block; }
</style>
</head>
<body>

<div id="app">
  <div id="world">
    <!-- Furniture and characters get rendered here from JS -->
    <div id="furniture"></div>
    <div id="player" class="char obj">
      <div class="head"></div>
      <div class="body"></div>
      <div class="shadow"></div>
    </div>
    <div id="milli" class="char obj tappable" title="Milli">
      <div class="head"></div>
      <div class="body"></div>
      <div class="shadow"></div>
    </div>

    <!-- Inventory badge — world-layer, shows what the player is holding -->
    <div id="inventory"></div>

    <!-- Conversation overlay (hidden by default; shown when mode flips) -->
    <div id="conversation">
      <div id="milli-portrait">
        <div class="p-head"></div>
        <div class="p-body"></div>
      </div>
      <div id="milli-name">Milli</div>
      <div id="milli-line-wrap">
        <div id="milli-line" class="empty">…</div>
      </div>
      <div id="conv-footer">
        <div id="chat-hint">Type to Milli in the chat ↓</div>
        <button class="leave-btn" id="leave-btn">Step away</button>
      </div>
    </div>

    <!-- Outcome card (Day 2b) — brief held moment after end_conversation -->
    <div id="outcome">
      <div id="outcome-mood">—</div>
      <div id="outcome-summary"></div>
      <div id="outcome-delta"></div>
    </div>
  </div>

  <div id="hud">
    <div class="left" id="hud-mode">world</div>
    <div class="right" id="hud-hint">tap to move · tap Milli to talk</div>
  </div>
</div>

<div id="no-host">
  <strong>Doorway widget — host bridge not detected.</strong>
  <p>This widget is meant to load inside ChatGPT. If you're seeing this in a regular browser, that's expected — open it via the connector instead.</p>
</div>

<script>
(function () {
  "use strict";

  // ---- Detect host ---------------------------------------------------------
  const inChatGPT = typeof window !== "undefined" && !!window.openai;
  if (!inChatGPT) {
    document.body.classList.add("no-host");
    return;
  }

  // ---- DOM refs ------------------------------------------------------------
  const app = document.getElementById("app");
  const world = document.getElementById("world");
  const furnitureLayer = document.getElementById("furniture");
  const playerEl = document.getElementById("player");
  const milliEl = document.getElementById("milli");
  const conversationEl = document.getElementById("conversation");
  const milliLineEl = document.getElementById("milli-line");
  const leaveBtn = document.getElementById("leave-btn");
  const hudMode = document.getElementById("hud-mode");
  const hudHint = document.getElementById("hud-hint");
  const inventoryEl = document.getElementById("inventory");
  const outcomeEl = document.getElementById("outcome");
  const outcomeMoodEl = document.getElementById("outcome-mood");
  const outcomeSummaryEl = document.getElementById("outcome-summary");
  const outcomeDeltaEl = document.getElementById("outcome-delta");

  // ---- Mood palette --------------------------------------------------------
  // A subtle tonal cue on the left bar of the line. Intentionally muted —
  // moods shouldn't shout, they should colour.
  const MOOD_COLOR = {
    warm:    "rgba(232, 200, 168, 0.7)",
    dry:     "rgba(159, 176, 154, 0.7)",
    curious: "rgba(212, 183, 106, 0.7)",
    guarded: "rgba(122, 138, 154, 0.7)",
    amused:  "rgba(216, 154, 138, 0.7)",
    quiet:   "rgba(138, 138, 138, 0.55)",
  };

  // mood_after is the closing-conversation tone, distinct from per-line mood.
  // Same vocabulary family — warmer/cooler tints of her voice afterward.
  const OUTCOME_MOOD_COLOR = {
    opened:    "rgba(232, 200, 168, 0.8)",   // warm, something happened
    small:     "rgba(192, 180, 158, 0.55)",  // ordinary, fine
    unchanged: "rgba(138, 138, 138, 0.45)",  // neutral, held steady
    hurt:      "rgba(170, 110, 100, 0.7)",   // she's closed a little
  };

  // Human-readable item → emoji-ish glyph. Keep small; real art later.
  const INVENTORY_GLYPH = {
    wildflower: "❀",
    recipe_card: "📜",
  };

  // ---- State ---------------------------------------------------------------
  // The widget treats toolOutput as the source of truth on every render.
  // No load-bearing JS state — see CHATGPT_APP_HANDOVER.md hybrid pattern.
  //
  // EXCEPTION (learned the hard way, Day 1): widget-initiated tool calls
  // (approach_milli, leave_milli) don't reliably trigger toolOutput updates
  // in ChatGPT the way model-initiated calls do. So we keep a short-lived
  // `override` payload that takes precedence over window.openai.toolOutput
  // until the next host refresh. The server is still source of truth — we
  // just stop pretending the widget can wait silently for the host to push.
  let furnitureRendered = false;
  let pendingToolCall = false;
  let override = null;

  // Tracks which inventory items we've already shown so we can animate only
  // new arrivals. Departures need a bit more care — see renderInventory.
  let lastInventorySet = new Set();

  // Tracks the last outcome identity we displayed, so we don't re-show the
  // outcome card on every structuredContent refresh. Keyed on summary text
  // (good enough — the model's summaries are long enough to be unique).
  let lastOutcomeShown = null;
  let outcomeTimer = null;

  // ---- Coordinate translation ---------------------------------------------
  // Server gives 0–100 coords; we convert to % strings for CSS positioning.
  // This means the room scales to whatever iframe size ChatGPT hands us.
  function toPercent(coord) {
    return Math.max(0, Math.min(100, coord)) + "%";
  }

  // The Apps SDK has shifted the shape of callTool's return value across
  // versions. Be generous about what we accept.
  function extractOutput(result) {
    if (!result || typeof result !== "object") return null;
    if (result.structuredContent) return result.structuredContent;
    if (result.toolOutput) return result.toolOutput;
    if (result.mode || result.player_position) return result; // already the payload
    return null;
  }

  function currentOutput() {
    if (override) return override;
    return (window.openai && window.openai.toolOutput) || {};
  }

  // ---- Render furniture once ----------------------------------------------
  function renderFurniture(room) {
    if (furnitureRendered || !room || !room.furniture) return;
    furnitureLayer.innerHTML = "";
    for (const f of room.furniture) {
      const el = document.createElement("div");
      el.className = "obj furn " + (f.kind || "");
      el.style.left = toPercent(f.x);
      el.style.top = toPercent(f.y);
      el.style.width = (f.w || 5) + "%";
      el.style.height = (f.h || 5) + "%";
      furnitureLayer.appendChild(el);
    }
    furnitureRendered = true;
  }

  // ---- Render characters --------------------------------------------------
  function renderCharacters(toolOutput) {
    if (toolOutput.player_position) {
      playerEl.style.left = toPercent(toolOutput.player_position.x);
      playerEl.style.top = toPercent(toolOutput.player_position.y);
    }
    if (toolOutput.milli_position) {
      milliEl.style.left = toPercent(toolOutput.milli_position.x);
      milliEl.style.top = toPercent(toolOutput.milli_position.y);
    }
  }

  // ---- Render mode (world vs in_conversation_with_milli) ------------------
  function renderMode(mode) {
    hudMode.textContent = mode || "world";
    if (mode === "in_conversation_with_milli") {
      conversationEl.classList.add("show");
      milliEl.classList.remove("tappable");
      hudHint.textContent = "talking to Milli";
    } else {
      conversationEl.classList.remove("show");
      milliEl.classList.add("tappable");
      hudHint.textContent = "tap to move · tap Milli to talk";
    }
  }

  // ---- Render Milli's line -------------------------------------------------
  // Track the last rendered line so we only re-animate when it actually
  // changes. Otherwise every render() call (there are a few a second during
  // taps / global updates) would restart the fade-in and look like a stutter.
  let lastRenderedLine = undefined;
  function renderMilliLine(line, mood) {
    const incoming = line == null ? null : String(line);
    if (incoming === lastRenderedLine) return; // no change, leave it alone
    lastRenderedLine = incoming;

    const color = MOOD_COLOR[mood] || MOOD_COLOR.warm;
    milliLineEl.style.setProperty("--mood-color", color);

    // Momentarily hide, swap text, re-show — tiny fade that reads as speech.
    milliLineEl.classList.remove("shown");
    if (!incoming) {
      milliLineEl.classList.add("empty");
      milliLineEl.textContent = "…";
      // Give the "..." the shown state so it fades in once, then sits there.
      requestAnimationFrame(function () {
        milliLineEl.classList.add("shown");
      });
      return;
    }
    milliLineEl.classList.remove("empty");
    // Double rAF guarantees the transition restarts cleanly across browsers.
    requestAnimationFrame(function () {
      milliLineEl.textContent = incoming;
      requestAnimationFrame(function () {
        milliLineEl.classList.add("shown");
      });
    });
  }

  // ---- Render inventory ---------------------------------------------------
  // Day 2b: diff against what we last showed. New items fade/scale in.
  // Departing items get removed with the transition already handled by CSS
  // (the container's own opacity handles empty-state dissolution).
  function renderInventory(inventory) {
    const items = Array.isArray(inventory) ? inventory : [];
    const incomingSet = new Set(items);

    if (items.length === 0) {
      inventoryEl.classList.remove("show");
      // Fade out the container first, then clear — avoids a snap-to-empty.
      setTimeout(function () {
        if (inventoryEl.children.length && !inventoryEl.classList.contains("show")) {
          inventoryEl.innerHTML = "";
        }
      }, 280);
      lastInventorySet = incomingSet;
      return;
    }

    // Simple full redraw when the set has actually changed. Items that
    // existed last time render without the enter animation; new items
    // animate in.
    const changed =
      incomingSet.size !== lastInventorySet.size ||
      items.some(function (id) { return !lastInventorySet.has(id); });

    if (!changed) {
      inventoryEl.classList.add("show");
      return;
    }

    inventoryEl.innerHTML = "";
    items.forEach(function (id) {
      const glyph = INVENTORY_GLYPH[id] || "•";
      const el = document.createElement("div");
      el.className = "inv-item";
      el.title = id;
      el.textContent = glyph;
      const isNew = !lastInventorySet.has(id);
      if (isNew) {
        el.classList.add("enter");
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            el.classList.add("shown");
          });
        });
      }
      inventoryEl.appendChild(el);
    });
    inventoryEl.classList.add("show");
    lastInventorySet = incomingSet;
  }

  // ---- Render outcome card (Day 2b) ---------------------------------------
  // Shows briefly after end_conversation. Triggers off last_action — we
  // only want to reveal this when the model just ended the conversation,
  // not on every refresh that happens to carry last_outcome.
  function renderOutcome(out) {
    const outcome = out && out.last_outcome;
    const action = out && out.last_action;
    const justEnded = action === "end_conversation";

    // Only fire on the transition moment — not on subsequent refreshes.
    if (!justEnded || !outcome || !outcome.conversation_summary) return;
    if (outcome.conversation_summary === lastOutcomeShown) return;
    lastOutcomeShown = outcome.conversation_summary;

    const mood = outcome.mood_after || "small";
    const color = OUTCOME_MOOD_COLOR[mood] || OUTCOME_MOOD_COLOR.small;
    outcomeEl.style.setProperty("--outcome-mood-color", color);

    outcomeMoodEl.textContent = mood;
    outcomeSummaryEl.textContent = outcome.conversation_summary;

    const delta = outcome.relationship_delta;
    let deltaText = "";
    if (delta === 1) deltaText = "warmer";
    else if (delta === -1) deltaText = "pushed away";
    else if (delta === 0) deltaText = "held steady";
    outcomeDeltaEl.textContent = deltaText;

    // Reveal, hold ~3.8s, fade. If another outcome lands while this one is
    // still visible, we clear the pending timer and restart.
    if (outcomeTimer) clearTimeout(outcomeTimer);
    outcomeEl.classList.add("show");
    outcomeTimer = setTimeout(function () {
      outcomeEl.classList.remove("show");
      outcomeTimer = null;
    }, 3800);
  }

  // ---- Full render --------------------------------------------------------
  function render() {
    const out = currentOutput();
    if (out.room) renderFurniture(out.room);
    renderCharacters(out);
    renderMode(out.mode);
    renderInventory(out.inventory);
    renderMilliLine(out.milli_line, out.milli_mood);
    renderOutcome(out);
  }

  // ---- Tool call helper ---------------------------------------------------
  // Two-layer update: optimistic local flip (so the UI feels instant) plus
  // whatever the server returns (the truth). If the host later pushes a
  // toolOutput update we'll pick that up naturally — clearing `override`.
  async function callTool(name, optimisticPatch) {
    if (pendingToolCall) return;
    pendingToolCall = true;

    // Optimistic flip — the widget knows the expected transition.
    if (optimisticPatch) {
      override = Object.assign({}, currentOutput(), optimisticPatch);
      render();
    }

    try {
      const result = await window.openai.callTool(name, {});
      const fresh = extractOutput(result);
      if (fresh) {
        override = fresh;
        render();
      }
    } catch (err) {
      console.error("[doorway] callTool failed", name, err);
      // Revert optimism on failure so we don't show a lie.
      override = null;
      render();
    } finally {
      // Brief settle window so we don't double-fire on accidental taps.
      setTimeout(() => { pendingToolCall = false; }, 300);
    }
  }

  // ---- Tap-to-move (visual only — no server commit until engagement) ------
  function handleWorldTap(e) {
    // Ignore taps while in conversation mode or while outcome is showing.
    const mode = currentOutput().mode;
    if (mode === "in_conversation_with_milli") return;
    if (outcomeEl.classList.contains("show")) return;

    // Compute tap position as % of the world rect
    const rect = world.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;

    // Tap on Milli (or close enough): walk-then-approach.
    // Hit area is generous — 18 units in 0–100 coords ≈ ~18% of the room —
    // so players don't have to pixel-hunt the sprite.
    const out = currentOutput();
    const milliPos = out.milli_position;
    const hitMilli = e.target === milliEl || milliEl.contains(e.target);
    if (milliPos) {
      const dx = x - milliPos.x;
      const dy = y - milliPos.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (hitMilli || distance < 18) {
        // Animate player toward Milli, then fire approach_milli.
        playerEl.style.left = toPercent(milliPos.x - 8);
        playerEl.style.top = toPercent(milliPos.y + 4);
        setTimeout(function () {
          callTool("approach_milli", {
            mode: "in_conversation_with_milli",
            player_position: { x: milliPos.x - 8, y: milliPos.y + 4 },
          });
        }, 480);
        return;
      }
    }

    // Plain floor tap — animate locally only, no server call.
    playerEl.style.left = toPercent(x);
    playerEl.style.top = toPercent(y);
  }

  world.addEventListener("click", handleWorldTap);

  leaveBtn.addEventListener("click", function () {
    leaveBtn.disabled = true;
    callTool("leave_milli", { mode: "world" })
      .finally(function () { leaveBtn.disabled = false; });
  });

  // ---- Display mode pinning -----------------------------------------------
  // Design decision (Day 1): the widget IS the game. One pinned window,
  // chats flow underneath.
  //
  // CRITICAL — v5 fix: requestDisplayMode is gesture-gated by the browser.
  // Calling it on mount, inside setTimeout, or after `await` silently
  // fails and returns undefined (so .then crashes). It MUST be called
  // synchronously inside a real user-gesture handler (pointerdown/click).
  // See CHATGPT_APP_HANDOVER.md "The user-gesture rule" section.
  //
  // Pattern: install a one-shot pointerdown listener at capture phase.
  // First tap on the widget = pin gesture. No button needed — happens
  // invisibly. Argument shape is { mode: "pip" }, NOT just "pip".
  function reflectDisplayMode(mode) {
    document.body.classList.toggle("pinned", mode === "pip");
    document.body.classList.toggle("fullscreen", mode === "fullscreen");
  }

  function attemptPipOnFirstGesture() {
    if (typeof window.openai.requestDisplayMode !== "function") return;
    if (window.openai.displayMode === "pip") return; // already pinned
    const handler = function () {
      document.removeEventListener("pointerdown", handler, true);
      // SYNCHRONOUS call inside the gesture handler. Do NOT await before
      // the call — that drops the gesture context.
      let ret;
      try {
        ret = window.openai.requestDisplayMode({ mode: "pip" });
      } catch (err) {
        console.warn("[doorway] PIP request threw, staying inline", err);
        return;
      }
      // Handle the promise async — gesture context has already been used.
      Promise.resolve(ret)
        .then(function (result) {
          const granted =
            (result && typeof result === "object" && result.mode) ||
            (typeof result === "string" && result) ||
            window.openai.displayMode ||
            "inline";
          reflectDisplayMode(granted);
        })
        .catch(function (err) {
          console.warn("[doorway] PIP request declined, staying inline", err);
        });
    };
    // capture:true so we fire before world's click handler has a chance
    // to stopPropagation or otherwise interfere. passive:true because we
    // don't need to preventDefault — we just want to read the gesture.
    document.addEventListener("pointerdown", handler, { capture: true, passive: true });
  }

  // ---- React to host updates ----------------------------------------------
  // openai:set_globals fires on viewport changes, theme switches, mode
  // transitions, AND display mode changes. When the host pushes a fresh
  // toolOutput, trust it over our optimistic override.
  window.addEventListener("openai:set_globals", function () {
    override = null;
    reflectDisplayMode(window.openai.displayMode || "inline");
    render();
  });

  // MCP notifications — tool results from widget-initiated calls.
  window.addEventListener("message", function (event) {
    const data = event && event.data;
    if (data && data.method === "ui/notifications/tool-result") {
      override = null;
      render();
    }
  });

  // ---- Initial render -----------------------------------------------------
  reflectDisplayMode(window.openai.displayMode || "inline");
  render();
  requestAnimationFrame(function () { app.classList.add("ready"); });
  // Arm the pin request — fires on the user's first tap anywhere in the
  // widget. Cannot fire on mount (browser gesture rule). See the comment
  // on attemptPipOnFirstGesture and the handover doc.
  attemptPipOnFirstGesture();
})();
</script>

</body>
</html>
